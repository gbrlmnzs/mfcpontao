<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jorge — Uma Jornada Metabólica | PCDT DM2 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">

<style>
/* ─── Reset ─────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

/* ─── Tokens ─────────────────────────────────────────────────── */
:root {
  --ff-body:    'DM Sans', system-ui, sans-serif;
  --ff-accent:  'Lora', Georgia, serif;

  --cream:      #F7F4EF;
  --cream-dark: #EDE8DF;
  --sand:       #E6DFD2;
  --sand-dark:  #D4C9B5;
  --text:       #1C1810;
  --text-2:     #5A5040;
  --text-3:     #9A8E7C;
  --border:     rgba(90,70,40,.14);
  --border-2:   rgba(90,70,40,.25);

  --blue-bg:    #EDF4FD;
  --blue-bd:    #B3CEEE;
  --blue-txt:   #1A4E8A;
  --blue-mid:   #2C6DB8;

  --green-bg:   #EDFAF0;
  --green-bd:   #A5D9AD;
  --green-txt:  #1A6327;

  --amber-bg:   #FDF5E4;
  --amber-bd:   #E8C065;
  --amber-txt:  #7A4A08;

  --red-bg:     #FEF0F0;
  --red-bd:     #F0B0B0;
  --red-txt:    #8A1C1C;

  --warn-bg:    #FEF8EC;
  --warn-bd:    #ECC87A;

  --ok:         #1A6327;
  --warn:       #7A4A08;
  --bad:        #8A1C1C;

  --r-sm:  6px;
  --r-md:  10px;
  --r-lg:  16px;
  --r-xl:  22px;

  --shadow-card: 0 2px 12px rgba(60,40,15,.09), 0 1px 3px rgba(60,40,15,.06);
  --shadow-hover: 0 4px 20px rgba(60,40,15,.13), 0 2px 6px rgba(60,40,15,.08);
}

/* ─── Base ───────────────────────────────────────────────────── */
body {
  font-family: var(--ff-body);
  font-size: 16px;
  color: var(--text);
  background: linear-gradient(160deg, #F2EDE4 0%, #EBE5D9 40%, #F0EBE1 100%);
  min-height: 100vh;
  padding: clamp(1rem, 4vw, 2.5rem) clamp(.75rem, 4vw, 1.5rem);
  display: flex;
  justify-content: center;
  align-items: flex-start;
}

.app-wrap {
  width: min(100%, 920px);
  margin: 0 auto;
}

/* ─── Page header ────────────────────────────────────────────── */
.page-header {
  margin-bottom: clamp(1.25rem, 4vw, 2rem);
}

.hero-row {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 1rem;
}

.avatar {
  width: clamp(44px, 7vw, 56px);
  height: clamp(44px, 7vw, 56px);
  border-radius: 50%;
  background: var(--sand);
  border: 2px solid var(--sand-dark);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: clamp(20px, 3.5vw, 28px);
  flex-shrink: 0;
  box-shadow: 0 2px 8px rgba(60,40,10,.12);
}

.hero-text h1 {
  font-family: var(--ff-accent);
  font-size: clamp(17px, 2.8vw, 22px);
  font-weight: 600;
  color: var(--text);
  letter-spacing: -.2px;
  line-height: 1.25;
}

.hero-text p {
  font-size: clamp(12px, 1.8vw, 13.5px);
  color: var(--text-2);
  margin-top: 3px;
  line-height: 1.5;
}

/* ─── Progress bar ───────────────────────────────────────────── */
.progress-track {
  height: 3px;
  background: var(--sand);
  border-radius: 2px;
  margin-bottom: 1.25rem;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #7A6040, #4A3820);
  border-radius: 2px;
  transition: width .4s ease;
}

/* ─── Timeline ───────────────────────────────────────────────── */
.timeline-scroll {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  padding-bottom: 6px;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
}
.timeline-scroll::-webkit-scrollbar { display: none; }

.tl-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
  flex-shrink: 0;
  cursor: pointer;
  opacity: .45;
  transition: opacity .2s, transform .15s;
  padding: 2px 4px;
}
.tl-item:hover { opacity: .75; transform: translateY(-1px); }
.tl-item.past  { opacity: .6; }
.tl-item.active{ opacity: 1; }

.tl-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  border: 2px solid var(--sand-dark);
  background: var(--cream);
  transition: all .2s;
}
.tl-item.past .tl-dot   { background: var(--sand-dark); border-color: var(--sand-dark); }
.tl-item.active .tl-dot { background: var(--text); border-color: var(--text); width: 13px; height: 13px; }

.tl-item.danger .tl-dot           { border-color: #C0392B; }
.tl-item.danger.past .tl-dot      { background: rgba(192,57,43,.35); border-color: rgba(192,57,43,.5); }
.tl-item.danger.active .tl-dot    { background: #C0392B; border-color: #C0392B; }

.tl-label {
  font-size: 10.5px;
  color: var(--text-3);
  white-space: nowrap;
  font-weight: 500;
  letter-spacing: .01em;
}
.tl-item.active .tl-label { color: var(--text); font-weight: 600; }

/* ─── Card ───────────────────────────────────────────────────── */
.case-card {
  background: #FDFBF7;
  border: 1px solid var(--border);
  border-radius: var(--r-xl);
  overflow: hidden;
  box-shadow: var(--shadow-card);
  transition: box-shadow .2s;
}

/* ─── Year strip ─────────────────────────────────────────────── */
.year-strip {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: .6rem 1.5rem;
  background: var(--sand);
  border-bottom: 1px solid var(--border);
}
.year-lbl {
  font-size: 10.5px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .07em;
  color: var(--text-3);
}
.year-arrow { font-size: 11px; color: var(--text-3); }
.year-val {
  font-family: var(--ff-accent);
  font-size: 13.5px;
  font-weight: 600;
  color: var(--text);
}

/* ─── Card header ────────────────────────────────────────────── */
.case-header {
  padding: clamp(.9rem, 2.5vw, 1.25rem) clamp(1rem, 3vw, 1.5rem);
  border-bottom: 1px solid var(--border);
}
.case-header.sev-normal  { background: var(--cream-dark); }
.case-header.sev-warning { background: var(--warn-bg);  border-color: var(--warn-bd); }
.case-header.sev-bad     { background: #FEF3EB; border-color: #EEC498; }
.case-header.sev-danger  { background: var(--red-bg); border-color: var(--red-bd); }

.ch-row {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  flex-wrap: wrap;
}
.ch-title {
  font-family: var(--ff-accent);
  font-size: clamp(15px, 2.5vw, 18px);
  font-weight: 600;
  color: var(--text);
  margin-bottom: 4px;
  line-height: 1.3;
}
.ch-subtitle {
  font-size: clamp(12px, 1.8vw, 13px);
  color: var(--text-2);
  line-height: 1.45;
}
.age-badge {
  flex-shrink: 0;
  padding: 5px 14px;
  border-radius: 999px;
  font-size: 12.5px;
  font-weight: 600;
  background: rgba(255,255,255,.7);
  border: 1px solid var(--border-2);
  color: var(--text);
  white-space: nowrap;
  align-self: flex-start;
}

/* ─── Card body ──────────────────────────────────────────────── */
.case-body {
  padding: clamp(1rem, 3vw, 1.5rem);
}

/* ─── Vignette ───────────────────────────────────────────────── */
.vignette {
  background: var(--cream-dark);
  border-radius: var(--r-md);
  padding: clamp(.85rem, 2.5vw, 1.1rem) clamp(.9rem, 2.5vw, 1.2rem);
  margin-bottom: 1.25rem;
  border-left: 3px solid var(--sand-dark);
  font-size: clamp(13.5px, 1.9vw, 14.5px);
  line-height: 1.8;
  color: var(--text);
}
.vignette em { font-style: italic; color: var(--text-2); }

/* ─── Question box ───────────────────────────────────────────── */
.question-box {
  background: var(--blue-bg);
  border: 1px solid var(--blue-bd);
  border-radius: var(--r-md);
  padding: clamp(.85rem, 2.5vw, 1rem) clamp(.9rem, 2.5vw, 1.2rem);
  margin-bottom: 1.25rem;
  display: flex;
  gap: 10px;
  align-items: flex-start;
}
.q-icon { font-size: 20px; color: var(--blue-mid); flex-shrink: 0; margin-top: 1px; }
.q-text { font-size: clamp(13.5px, 1.9vw, 14.5px); font-weight: 500; color: var(--blue-txt); line-height: 1.55; }

/* ─── Exams ──────────────────────────────────────────────────── */
.exams-section { margin-bottom: 1.25rem; }
.block-lbl {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .07em;
  color: var(--text-3);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 5px;
}
.data-box {
  background: var(--cream);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  overflow: hidden;
}
.data-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 14px;
  border-bottom: 1px solid var(--border);
  gap: 12px;
}
.data-row:last-child { border-bottom: none; }
.data-key {
  font-size: clamp(13px, 1.8vw, 13.5px);
  color: var(--text-2);
  flex: 1;
  min-width: 0;
}
.data-val {
  font-size: clamp(13px, 1.8vw, 13.5px);
  font-weight: 600;
  text-align: right;
  flex-shrink: 0;
}
.data-ref {
  display: block;
  font-size: 11px;
  font-weight: 400;
  color: var(--text-3);
  margin-top: 1px;
}
.ok   { color: var(--ok); }
.warn { color: var(--warn); }
.bad  { color: var(--bad); }

/* ─── Reveal button ──────────────────────────────────────────── */
.reveal-btn {
  width: 100%;
  padding: 12px 16px;
  border-radius: var(--r-md);
  border: 1.5px dashed var(--border-2);
  background: transparent;
  font-family: var(--ff-body);
  font-size: clamp(13.5px, 1.9vw, 14px);
  font-weight: 500;
  color: var(--text-2);
  cursor: pointer;
  margin-bottom: 1.25rem;
  transition: all .18s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.reveal-btn:hover {
  background: var(--cream-dark);
  color: var(--text);
  border-color: var(--sand-dark);
  border-style: solid;
  transform: translateY(-1px);
  box-shadow: 0 2px 8px rgba(60,40,10,.1);
}
.reveal-btn:active { transform: translateY(0); box-shadow: none; }
.reveal-btn:focus-visible { outline: 2px solid var(--blue-mid); outline-offset: 2px; }
.reveal-btn.is-open {
  border-style: solid;
  background: var(--cream-dark);
  color: var(--text);
  border-color: var(--sand-dark);
}

/* ─── Answer section ─────────────────────────────────────────── */
.answer-section { display: none; }
.answer-section.visible { display: block; }

.answer-block { margin-bottom: 1.4rem; }
.answer-block p,
.answer-block li {
  font-size: clamp(13.5px, 1.9vw, 14.5px);
  line-height: 1.8;
  color: var(--text);
}
.answer-block ul { padding-left: 1.35rem; margin-top: 5px; }
.answer-block li { margin-bottom: 5px; }
.answer-block strong { font-weight: 600; }

/* ─── Complication tags ──────────────────────────────────────── */
.comp-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
.tag {
  display: inline-block;
  padding: 4px 11px;
  border-radius: 999px;
  font-size: 12.5px;
  font-weight: 500;
  border: 1px solid;
}
.tag-amber  { background: var(--amber-bg); color: var(--amber-txt); border-color: var(--amber-bd); }
.tag-red    { background: var(--red-bg);   color: var(--red-txt);   border-color: var(--red-bd);   }
.tag-blue   { background: var(--blue-bg);  color: var(--blue-txt);  border-color: var(--blue-bd);  }
.tag-green  { background: var(--green-bg); color: var(--green-txt); border-color: var(--green-bd); }
.tag-gray   { background: var(--cream-dark); color: var(--text-2);  border-color: var(--border-2); }

/* ─── Fluxogram ──────────────────────────────────────────────── */
.fluxo-wrap {
  background: var(--cream);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  padding: 1rem 1.1rem;
  margin-bottom: 1.25rem;
  text-align: center;
}
.fluxo-hdr {
  font-size: 10.5px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .07em;
  color: var(--text-3);
  margin-bottom: .75rem;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
}
.flux-row {
  display: flex;
  align-items: center;
  justify-content: center;
  flex-wrap: wrap;
  gap: 8px;
  margin: .45rem 0;
}
.flux-node {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--r-sm);
  padding: 6px 13px;
  font-size: 12.5px;
  font-weight: 500;
  line-height: 1.35;
  text-align: center;
  border: 1px solid;
}
.fn-blue   { background: var(--blue-bg);  border-color: var(--blue-bd);  color: var(--blue-txt);  }
.fn-green  { background: var(--green-bg); border-color: var(--green-bd); color: var(--green-txt); }
.fn-amber  { background: var(--amber-bg); border-color: var(--amber-bd); color: var(--amber-txt); }
.fn-red    { background: var(--red-bg);   border-color: var(--red-bd);   color: var(--red-txt);   }
.fn-gray   { background: var(--sand);     border-color: var(--sand-dark); color: var(--text-2);   }
.fn-hl     { outline: 2.5px solid #1A4E8A; outline-offset: 3px; }
.flux-arrow { color: var(--text-3); font-size: 14px; }
.flux-here {
  display: inline-block;
  font-size: 10px;
  font-weight: 700;
  color: var(--blue-txt);
  background: var(--blue-bg);
  border: 1px solid var(--blue-bd);
  border-radius: 999px;
  padding: 2px 8px;
  margin-top: 4px;
}

/* ─── Section divider ────────────────────────────────────────── */
.divider { height: 1px; background: var(--border); margin: 1.25rem 0; }

/* ─── SUS / SBD grid ─────────────────────────────────────────── */
.sus-sbd-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 1.25rem;
}
.sus-box, .sbd-box {
  border-radius: var(--r-md);
  padding: .9rem 1rem;
  border: 1px solid;
}
.sus-box { background: var(--blue-bg); border-color: var(--blue-bd); }
.sbd-box { background: var(--green-bg); border-color: var(--green-bd); }
.sbd-box.diverge { background: var(--red-bg); border-color: var(--red-bd); }

.box-hdr {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 7px;
}
.box-ttl-sus  { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--blue-txt); }
.box-ttl-sbd  { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--green-txt); }
.sbd-box.diverge .box-ttl-sbd { color: var(--red-txt); }
.sus-box p, .sbd-box p {
  font-size: clamp(12.5px, 1.8vw, 13px);
  line-height: 1.65;
  color: var(--text);
}

.agree-icon {
  width: 18px; height: 18px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10.5px;
  font-weight: 700;
  flex-shrink: 0;
  border: 1px solid;
}
.ic-check { background: var(--green-bg); color: var(--green-txt); border-color: var(--green-bd); }
.ic-x     { background: var(--red-bg);   color: var(--red-txt);   border-color: var(--red-bd);   }

/* ─── Footer note ────────────────────────────────────────────── */
.footer-note {
  padding-top: 1rem;
  border-top: 1px solid var(--border);
  font-size: clamp(12.5px, 1.7vw, 13px);
  color: var(--text-3);
  font-style: italic;
  line-height: 1.65;
}

/* ─── Nav footer ─────────────────────────────────────────────── */
.nav-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 1.25rem;
  padding-top: 1rem;
  border-top: 1px solid var(--border);
  gap: 12px;
}
.nav-btn {
  padding: 9px clamp(14px, 3vw, 22px);
  border-radius: var(--r-md);
  border: 1px solid var(--border-2);
  background: transparent;
  font-family: var(--ff-body);
  font-size: clamp(13px, 1.8vw, 14px);
  font-weight: 500;
  color: var(--text-2);
  cursor: pointer;
  transition: all .15s;
  display: flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
}
.nav-btn:hover {
  background: var(--cream-dark);
  color: var(--text);
  border-color: var(--sand-dark);
  transform: translateY(-1px);
  box-shadow: 0 2px 6px rgba(60,40,10,.1);
}
.nav-btn:active { transform: translateY(0); box-shadow: none; }
.nav-btn:focus-visible { outline: 2px solid var(--blue-mid); outline-offset: 2px; }
.nav-btn:disabled { opacity: .28; cursor: default; transform: none; box-shadow: none; }
.nav-counter { font-size: 12.5px; color: var(--text-3); font-weight: 500; }

/* ─── sr-only ────────────────────────────────────────────────── */
.sr-only {
  position: absolute; width: 1px; height: 1px;
  padding: 0; margin: -1px; overflow: hidden;
  clip: rect(0,0,0,0); white-space: nowrap; border-width: 0;
}

/* ─── Responsive ─────────────────────────────────────────────── */
@media (max-width: 640px) {
  body { padding: .75rem .75rem 2rem; }

  .sus-sbd-grid { grid-template-columns: 1fr; }

  .ch-row { flex-direction: row; }
  .age-badge { font-size: 11.5px; padding: 4px 10px; }

  .data-row {
    flex-direction: column;
    align-items: flex-start;
    gap: 3px;
    padding: 9px 12px;
  }
  .data-val { text-align: left; }

  .nav-btn { padding: 8px 14px; font-size: 13px; }
  .year-strip { padding: .55rem 1rem; }
  .case-header { padding: .85rem 1rem; }
  .case-body { padding: 1rem; }
  .fluxo-wrap { padding: .85rem .8rem; }
}

@media (min-width: 641px) and (max-width: 1024px) {
  .sus-sbd-grid { grid-template-columns: 1fr 1fr; }
}

@media (min-width: 1025px) {
  body { padding: 2.5rem 1.5rem 3.5rem; }
  .app-wrap { max-width: 920px; }
  .case-card { box-shadow: var(--shadow-hover); }
}
</style>
</head>
<body>

<h2 class="sr-only">Casos clínicos interativos: A jornada do Jorge com diabetes mellitus tipo 2 — do rastreamento até as complicações crônicas graves</h2>

<div class="app-wrap">

  <!-- Page header -->
  <div class="page-header">
    <div class="hero-row">
      <div class="avatar" aria-hidden="true">👨</div>
      <div class="hero-text">
        <h1>Jorge — uma jornada metabólica</h1>
        <p>Casos clínicos baseados no PCDT DM2 2026 e Diretrizes SBD 2024/2025</p>
      </div>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressBar" style="width:0%"></div>
    </div>
    <div class="timeline-scroll" id="timelineNav"></div>
  </div>

  <!-- Case card (rendered by JS) -->
  <div id="caseCard"></div>

</div>

<script>
/* ══════════════════════════════════════════════════════════════
   DATA
══════════════════════════════════════════════════════════════ */
const FLUXOS = {
  rastreamento_inicio: `
    <div class="flux-row">
      <div class="flux-node fn-gray">Indivíduo assintomático</div>
    </div>
    <div class="flux-row"><span class="flux-arrow">↓</span></div>
    <div class="flux-row">
      <div>
        <div class="flux-node fn-blue fn-hl">≥ 35 anos <em>ou</em> sobrepeso/obesidade + ≥ 1 fator de risco</div>
        <div><span class="flux-here">→ Jorge aqui: 34 anos + sobrepeso + HF</span></div>
      </div>
    </div>
    <div class="flux-row"><span class="flux-arrow">↓</span></div>
    <div class="flux-row">
      <div class="flux-node fn-blue">Solicitar GJ + HbA1c na mesma amostra</div>
    </div>`,

  rastreamento_normal: `
    <div class="flux-row">
      <div class="flux-node fn-gray">GJ + HbA1c solicitados</div>
    </div>

/* ══════════════════════════════════════════════════════════════
   STATE
══════════════════════════════════════════════════════════════ */
let current = 0;
let revealed = [];

/* ══════════════════════════════════════════════════════════════
   RENDER TIMELINE
══════════════════════════════════════════════════════════════ */
function buildTimeline() {
  const nav = document.getElementById('timelineNav');
  nav.innerHTML = '';
  cases.forEach((c, i) => {
    const item = document.createElement('div');
    const cls = ['tl-item'];
    if (i < current) cls.push('past');
    if (i === current) cls.push('active');
    if (c.severity === 'danger') cls.push('danger');
    item.className = cls.join(' ');
    item.title = c.title;
    item.innerHTML = `<div class="tl-dot"></div><span class="tl-label">${c.year}</span>`;
    item.onclick = () => { current = i; revealed = []; render(); buildTimeline(); };
    nav.appendChild(item);
  });
  const fill = Math.round((current / (cases.length - 1)) * 100);
  document.getElementById('progressBar').style.width = fill + '%';
}

/* ══════════════════════════════════════════════════════════════
   RENDER CASE
══════════════════════════════════════════════════════════════ */
function render() {
  const c = cases[current];
  const isRev = revealed.includes(current);

  /* exams */
  let examsHTML = '';
  if (c.exams) {
    const rows = c.exams.map(e => {
      const cls = e.status === 'ok' ? 'ok' : e.status === 'warn' ? 'warn' : 'bad';
      return `<div class="data-row">
        <span class="data-key">${e.label}</span>
        <span class="data-val ${cls}">${e.value}<span class="data-ref">${e.ref}</span></span>
      </div>`;
    }).join('');
    examsHTML = `<div class="exams-section">
      <div class="block-lbl">
        <i class="ti ti-flask" aria-hidden="true"></i> Exames
      </div>
      <div class="data-box">${rows}</div>
    </div>`;
  }

  /* answer blocks */
  let ansHTML = '';
  c.answerBlocks.forEach(b => {
    if (b.tags) {
      const tags = b.tags.map(t => `<span class="tag tag-${t.c}">${t.t}</span>`).join('');
      ansHTML += `<div class="answer-block">
        <div class="block-lbl">${b.label}</div>
        <div class="comp-tags">${tags}</div>
      </div>`;
    } else {
      ansHTML += `<div class="answer-block">
        <div class="block-lbl">${b.label}</div>
        ${b.content}
      </div>`;
    }
  });

  /* fluxogram */
  let fluxHTML = '';
  if (c.fluxo && FLUXOS[c.fluxo]) {
    fluxHTML = `<div class="fluxo-wrap">
      <div class="fluxo-hdr">
        <i class="ti ti-git-branch" aria-hidden="true"></i> Posição no fluxograma PCDT 2026
      </div>
      ${FLUXOS[c.fluxo]}
    </div>`;
  }

  /* SUS / SBD */
  const isDiverg = c.sbdDiverge;
  const sbdHdr = isDiverg
    ? `<div class="box-hdr"><div class="agree-icon ic-x">✗</div><span class="box-ttl-sbd">SBD 2024/2025</span></div>`
    : `<div class="box-hdr"><div class="agree-icon ic-check">✓</div><span class="box-ttl-sbd">SBD 2024/2025</span></div>`;

  let susSbdHTML = '';
  if (c.sus || c.sbd) {
    susSbdHTML = `<div class="sus-sbd-grid">
      <div class="sus-box">
        <div class="box-hdr"><span class="box-ttl-sus">SUS — PCDT 2026</span></div>
        <p>${c.sus || '—'}</p>
      </div>
      <div class="sbd-box${isDiverg ? ' diverge' : ''}">
        ${sbdHdr}
        <p>${c.sbd || '—'}</p>
      </div>
    </div>`;
  }

  /* footer note */
  const footerHTML = c.footerNote
    ? `<div class="footer-note">${c.footerNote}</div>` : '';

  /* header severity class */
  const sevMap = { normal:'sev-normal', warning:'sev-warning', bad:'sev-bad', danger:'sev-danger' };
  const sevCls = sevMap[c.severity] || 'sev-normal';

  document.getElementById('caseCard').innerHTML = `
    <div class="case-card">

      <div class="year-strip">
        <span class="year-lbl">Linha do tempo</span>
        <span class="year-arrow">→</span>
        <span class="year-val">${c.yearFull}</span>
      </div>

      <div class="case-header ${sevCls}">
        <div class="ch-row">
          <div>
            <div class="ch-title">${c.title}</div>
            <div class="ch-subtitle">${c.subtitle}</div>
          </div>
          <div class="age-badge">${c.label}</div>
        </div>
      </div>

      <div class="case-body">

        <div class="vignette">${c.vignette}</div>

        <div class="question-box">
          <i class="ti ti-help-circle q-icon" aria-hidden="true"></i>
          <p class="q-text">${c.bigQ}</p>
        </div>

        ${c.exams ? examsHTML : ''}

        <button class="reveal-btn${isRev ? ' is-open' : ''}" id="revealBtn" onclick="toggleReveal()">
          <i class="ti ti-${isRev ? 'eye-off' : 'eye'}" aria-hidden="true"></i>
          ${isRev ? 'Ocultar resposta e conduta' : 'Ver resposta e conduta'}
        </button>

        <div class="answer-section${isRev ? ' visible' : ''}" id="answerSection">
          ${ansHTML}
          ${fluxHTML}
          <div class="divider"></div>
          ${susSbdHTML}
          ${footerHTML}
        </div>

        <div class="nav-footer">
          <button class="nav-btn" onclick="navigate(-1)" ${current === 0 ? 'disabled' : ''}>
            <i class="ti ti-arrow-left" aria-hidden="true"></i> Anterior
          </button>
          <span class="nav-counter">${current + 1} / ${cases.length}</span>
          <button class="nav-btn" onclick="navigate(1)" ${current === cases.length - 1 ? 'disabled' : ''}>
            Próximo <i class="ti ti-arrow-right" aria-hidden="true"></i>
          </button>
        </div>

      </div>
    </div>`;
}

/* ══════════════════════════════════════════════════════════════
   ACTIONS
══════════════════════════════════════════════════════════════ */
function toggleReveal() {
  if (!revealed.includes(current)) revealed.push(current);
  else revealed = revealed.filter(x => x !== current);
  render();
}

function navigate(dir) {
  const next = current + dir;
  if (next >= 0 && next < cases.length) {
    current = next;
    render();
    buildTimeline();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

/* ══════════════════════════════════════════════════════════════
   INIT
══════════════════════════════════════════════════════════════ */
buildTimeline();
render();
</script>
